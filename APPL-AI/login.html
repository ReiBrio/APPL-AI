<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - APPL-AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
</head>
<body class="formBg">
    <div class="formContainer loginContainer">
        <button type="button" class="backBtn" onclick="window.location='landing-page.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back
        </button>
        
        <div class="formWrapper">
            <h1 class="formTitle">Welcome Back!</h1>
            <p class="formSubtitle">Please enter your details to log in.</p>
            
            <form id="loginForm" class="form">
                <div class="formInput">
                    <input type="text" id="username" name="username" placeholder="Username / Email" required>
                    <span class="formIcon formUserIcon"></span>
                </div>
                
                <div class="formInput">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <span class="formIcon formEyeIcon togglePassword"></span>
                </div>
                
                <div class="formOptions">
                    <label class="formCheckBox">
                        <input type="checkbox" name="remember" checked>
                        <span>Remember me</span>
                    </label>
                </div>

                <button type="submit" class="formBtn">Login</button>
            </form>
            
            <p class="formFooter">
                Don't have an account? <a href="register.html" class="formFooterLink">Register Now!</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="function/supabase.js"></script>
    <script src="function/utils.js"></script>
    <script src="function/auth.js"></script>
</body>
</html>
