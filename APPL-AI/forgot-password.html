<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - APPL-AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
</head>
<body class="formBg">
    <div class="formContainer">
        <a href="login.html" class="backBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back
        </a>
        
        <div id="forgotContainer" class="formWrapper">
            <h1 class="formTitle">Find Your Account</h1>
            <p class="formSubtitle">A verification code will be sent via email.</p>
            
            <form id="forgotForm" class="form">
                <div class="formInput">
                    <input type="email" id="forgotEmail" name="email" placeholder="Email" required>
                    <span class="formIcon formUserIcon"></span>
                </div>
                
                <div class="formInput">
                    <input type="text" id="verificationCode" name="code" placeholder="Code" required>
                    <span class="formIcon formLockIcon"></span>
                </div>
                
                <button type="button" class="formSendCodeBtn">Send Verification Code</button>
                
                <button type="submit" class="formBtn">Next</button>
            </form>
            
            <p class="formFooter">
                This step is for <span class="formHighlightText">Security</span> and <span class="formHighlightText">Login</span> purposes.
            </p>
        </div>
        
        <div id="resetContainer" class="formWrapper formHidden">
            <h1 class="formTitle">Reset Your Password</h1>
            <p class="formSubtitle">Enter new password</p>
            
            <form id="resetForm" class="form">
                <div class="formInput">
                    <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
                    <span class="formIcon formEyeIcon togglePassword"></span>
                </div>
                
                <div class="formInput">
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required>
                    <span class="formIcon formEyeIcon togglePassword"></span>
                </div>
                
                <p class="formPassMatchText">*Passwords must match*</p>
                
                <button type="submit" class="formBtn">Login</button>
            </form>
            
            <p class="formFooter">
                This step is for <span class="formHighlightText">Security</span> and <span class="formHighlightText">Login</span> purposes.
            </p>
        </div>
    </div>
    
    <script src="function/utils.js"></script>
    <script src="function/auth.js"></script>
</body>
</html>
