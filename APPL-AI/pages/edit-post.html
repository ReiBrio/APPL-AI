<div class="pageContent focus-mode">
    <div class="formContainer">
        <button class="backBtn" id="backToProfileBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back
        </button>

        <div class="formWrapper">
            <h1 class="formTitle">Edit Job Post</h1>
        </div>

        <form class="form" id="editPostForm">
            <div class="formSection">
                <h3>Job Information</h3>
                
                <div class="formInput">
                    <label>Job Title</label>
                    <input type="text" required>
                </div>

                <div class="formInput">
                    <label>Department/Team</label>
                    <input type="text" required>
                </div>

                <div class="formInput">
                    <label>Deployment Type</label>
                    <select required>
                        <option value="">Select Deployment Type</option>
                        <option>Full-time</option>
                        <option>Part-time</option>
                        <option>Contract</option>
                        <option>Internship</option>
                    </select>
                </div>

                <div class="formInput">
                    <label>Work Setup</label>
                    <select required>
                        <option value="">Select Work Setup</option>
                        <option>On-site</option>
                        <option>Remote</option>
                        <option>Hybrid</option>
                    </select>
                </div>

                <div class="formInput">
                    <label>Deployment Location</label>
                    <input type="text" placeholder="Enter Deployment Location" required>
                </div>

                <div class="formInput">
                    <label>Working Hours Per Week</label>
                    <input type="text" placeholder="Enter Working Hours per week" required>
                </div>

                <div class="formInput">
                    <label>Salary Range</label>
                    <input type="text" placeholder="Enter Salary Range" required>
                </div>

                <div class="formInput">
                    <label>Slots Available</label>
                    <input type="text" placeholder="Enter Slots Available" required>
                </div>

                <p class="formNote">For the following, leave blank if not needed.</p>

                <div class="formInput">
                    <label>Ideal Age Range</label>
                    <select>
                        <label>Ideal Age Range</label>
                        <option value="">Select Ideal Age Range</option>
                        <option>18-25</option>
                        <option>26-35</option>
                        <option>36-45</option>
                        <option>46+</option>
                    </select>
                </div>

                <div class="formInput">
                    <label>Ideal Educational Attainment</label>
                    <select id="educationAttained" name="educationAttained" required>
                        <option value="" disabled selected>Select Education Attained</option>
                        <option>No Formal Education</option>
                        <option>Elementary Graduate</option>
                        <option>Junior High School Graduate</option>
                        <option>Senior High School Graduate</option>
                        <option>Vocational / Technical Certificate</option>
                        <option>Some College</option>
                        <option>Associate Degree</option>
                        <option>Bachelor’s Degree</option>
                        <option>Master’s Degree</option>
                        <option>Doctorate / PhD</option>
                    </select>
                </div>

                <div class="formInput">
                    <label>Ideal Years of Experience</label>
                    <input type="text" placeholder="Enter Ideal Years of Experience">
                </div>

                <div class="formInput">
                    <label>Ideal Skills</label>
                    <textarea rows="4" placeholder="Enumerate Ideal Skills"></textarea>
                </div>
            </div>

            <div class="formSection">
                <h3>Post Information</h3>
                
                <div class="formInput">
                    <label>Post Description</label>
                    <textarea rows="4" placeholder="Enter Post Description" required></textarea>
                </div>

                <div class="formCheckBox">
                    <input type="checkbox" id="attachJobInfo">
                    <label for="attachJobInfo">
                        Attach <span class="highlight-text">Job Information</span> Below Description
                    </label>
                </div>

                <div class="formInput">
                    <label>Post Deadline</label>
                    <input type="date">
                </div>

            <div class="fileUploadSection formInput">
                <label>Job Image/Poster</label>
                <div class="fileDropZone">
                    <img src="https://grazia-prod.oss-ap-southeast-1.aliyuncs.com/resources/uid_100015866/8877.png" alt="Current poster" style="max-width: 200px;">
                    <p>or</p>
                    <p>Drag and Drop files or <button class="browseBtn" id="browseBtn">Browse</button></p>
                </div>
            </div>

            <div class="formFooter">
                <button type="submit" class="savePostBtn formBtn">Update Job Post</button>
                <button type="button" class="deletePostBtn formBtn">Delete Post</button>
            </div>
        </form>
    </div>
</div>
