<div class="pageContent focus-mode viewApplicant">
    <div class="focusInner">
        <div class="viewApplicantsHeader pageHeader">
            <h2 class="pageTitle">Applicants</h2>

            <div class="pageFilter">
                <span class="filterLabel">Filter By:</span>

                <select class="filterSelect" id="applicantsDateFilter">
                    <option value="mostRecent">Most Recent</option>
                    <option value="oldest">Oldest</option>
                </select>

                <select class="filterSelect" id="applicantsMatchFilter">
                    <option value="all">Match Score</option>
                    <option value="passed">Passed</option>
                    <option value="failed">Failed</option>
                </select>

                <select class="filterSelect" id="applicantsStatusFilter">
                    <option value="all">Application Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Approved">Approved</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>
        </div>

        <div class="viewApplicantsLayout">
            <div class="applicantsMain">
                <div class="applicantsActions">
                    <div class="selectedCountContainer">
                        <span class="selectedCount">0 Selected</span>
                    </div>
                    <div class="applicantsBtns">
                        <button type="button" class="selectAllBtn applicantsBtn">Select All</button>
                        <button type="button" class="resetSelectedBtn applicantsBtn">Reset</button>
                        <button type="button" class="approveSelectedBtn applicantsBtn">Approve</button>
                        <button type="button" class="rejectSelectedBtn applicantsBtn">Reject</button>
                    </div>
                </div>

                <div class="applicantsList" id="applicantsListContainer"></div>
            </div>
        </div>
    </div>
</div>
