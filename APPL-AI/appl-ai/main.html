<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appl-AI - Job Application Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mainContainer">
        <header class="mainHeader">
            <div class="mainHeaderL">
                <button class="menuToggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <a href="main.html">
                    <div class="mainLogo"></div>
                </a>

                <div class="searchToggleWrap">
                    <button class="searchToggleBtn" id="searchToggleBtn" aria-label="Open search">
                        <svg class="navIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>

                    <div class="searchPopup" id="searchPopup">
                        <div class="searchPopupInner">
                            <input type="text" id="searchPopupInput" placeholder="Search">
                            <button class="searchPopupClose" id="searchPopupClose" aria-label="Close search">&times;</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mainHeaderR">
                <button class="notificationBtn" id="notificationBtn">
                    <svg class="navIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                        <path d="M18.9,11.2s0-8.7-6.9-8.7-6.9,8.7-6.9,8.7v3.9L2.5,17.5h19l-2.6-2.4Z"
                            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                        <path d="M14.5,20.5s-.5,1-2.5,1-2.5-1-2.5-1"
                            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                    </svg>
                    <span class="notificationBadge" id="notificationBadge">3</span>
                </button>

                <button class="profileBtn" id="profileBtn">
                    <div class="profilePic"></div>
                </button>
            </div>
        </header>

        <div class="mainBody">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebarNav">
                    <div class="navSection">
                        <h4 class="navSectionTitle">Navigation</h4>
                        <a href="#" class="navLink active" data-page="home">
                            <svg class="navIcon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="m4 12 8-8 8 8M6 10.5V19a1 1 0 0 0 1 1h3v-3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3h3a1 1 0 0 0 1-1v-8.5"/>
                            </svg>
                            <span>Home</span>
                        </a>
                        <!--<a href="#" class="navLink" data-page="scan">
                            <svg class="navIcon icon-scan" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M18 9V4a1 1 0 0 0-1-1H8.914a1 1 0 0 0-.707.293L4.293 7.207A1 1 0 0 0 4 7.914V20a1 1 0 0 0 1 1h4M9 3v4a1 1 0 0 1-1 1H4m11 6v4m-2-2h4m3 0a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z"/>
                            </svg>
                            <span>Scan With Appl-AI</span>
                        </a>-->
                        <a href="#" class="navLink" data-page="saved">
                            <svg class="navIcon icon-saved" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="m17 21-5-4-5 4V3.889a.92.92 0 0 1 .244-.629.808.808 0 0 1 .59-.26h8.333a.81.81 0 0 1 .589.26.92.92 0 0 1 .244.63V21Z"/>
                            </svg>
                            <span>Saved</span>
                        </a> 
                        
                    </div>
                    <div class="navSection">
                        <h4 class="navSectionTitle">Resources</h4>
                        <a href="#" class="navLink settings">
                            <svg class="navIcon icon-settings" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-linecap="round" stroke-width="2"
                                d="M20 6H10m0 0a2 2 0 1 0-4 0m4 0a2 2 0 1 1-4 0m0 0H4m16 6h-2m0 0a2 2 0 1 0-4 0m4 0a2 2 0 1 1-4 0m0 0H4m16 6H10m0 0a2 2 0 1 0-4 0m4 0a2 2 0 1 1-4 0m0 0H4"/>
                            </svg>
                            <span>Settings</span>
                        </a>
                        <a href="#" class="navLink help">
                            <svg class="navIcon icon-help" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9.529 9.988a2.502 2.502 0 1 1 5 .191A2.441 2.441 0 0 1 12 12.582V14m-.01 3.008H12M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                            </svg>
                            <span>Help</span>
                        </a>
                        <a href="#" class="navLink rules">
                            <svg class="navIcon icon-user" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-width="2"
                                d="M7 17v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1a3 3 0 0 0-3-3h-4a3 3 0 0 0-3 3Z"/>
                                <path stroke="currentColor" stroke-width="2"
                                d="M15 8a3 3 0 1 1-6 0a3 3 0 0 1 6 0Z"/>
                            </svg>
                            <span>Rules</span>
                        </a>
                    </div>
                </nav>
                <div class="sidebarNavFooter">
                    
                    <p class="navFooterText">©2026 APPL-AI, All Rights Reserved</p>
                </div>
            </aside>

            <main class="mainContent" id="mainContent">
            </main>

            <aside class="featuredSidebar" id="featuredSidebar">
                <div class="featuredContainer">
                    <div class="featuredHeader">
                        <h3>Featured Companies</h3>
                    </div>
                    <div class="featuredList" id="featuredListContainer"></div>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal" id="notificationModal">
        <div class="notificationPanel">
            <div class="notificationHeader">
                <h3>Notifications</h3>
                <button class="closeBtn" data-modal="notificationModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="notificationContent" id="notificationContentContainer">
            </div>
        </div>
    </div>

    <div class="modal" id="applyModal">
        <div class="formContainer">
            <button class="backBtn" data-modal="applyModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back
                </button>
            <div class="formWrapper">
                <h1 class="formTitle">Apply For The Job!</h2>
                <p class="formSubtitle">Please make sure to attach the following:</p>
                <div class="fileUploadSection formInput">
                    <label>Attach a Resume File:</label>
                    <div class="fileDropZone" id="fileDropZone">
                        <p>Drag and Drop files or <button class="browseBtn" id="browseBtn">Browse</button></p>
                        <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx">
                    </div>
                </div>
                <button class="submit formBtn" id="submitApplicationBtn">Submit Application</button>
            </div>
        </div>
    </div>

    <script src="function/utils.js"></script>
    <script src="function/main.js"></script>
</body>
</html>
