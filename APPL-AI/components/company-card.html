<div class="featuredCompany" data-user-id="{{userId}}" data-user-type="{{userType}}">
    <div class="featuredCompanyImage">
        <img src="{{companyImage}}" alt="{{companyName}}">
    </div>
    <div class="companyInfo">
        <h4>{{companyName}}</h4>
        <p>{{companyIndustry}}</p>
    </div>
</div>
