<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - APPL-AI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="formBg">
    <div class="formContainer loginContainer">
        <a href="LandingPage.html" class="formBackLink">&#8592; Back</a>
        
        <div class="formWrapper">
            <h1 class="formTitle">Welcome Back!</h1>
            <p class="formSubtitle">Please enter your details to log in.</p>
            
            <form id="loginForm" class="form">
                <div class="formInput">
                    <input type="text" id="username" name="username" placeholder="Username / Email" required>
                    <span class="formIcon formUserIcon"></span>
                </div>
                
                <div class="formInput">
                    <input type="password" id="password" name="password" placeholder="Password" required>
                    <span class="formIcon formEyeIcon togglePassword"></span>
                </div>
                
                <div class="formOptions">
                    <label class="formCheckBox">
                        <input type="checkbox" name="remember" checked>
                        <span>Remember me</span>
                    </label>
                    <a href="ForgotPassword.html" class="forgotPasswordLink">Forgot Password</a>
                </div>
                <button type="login" class="formBtn">Login</button>
            </form>
            
            <p class="formFooter">
                Don't have an account? <a href="Register.html" class="formFooterLink">Register Now!</a>
            </p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
