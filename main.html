<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appl-AI - Job Application Platform</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mainContainer">
        <header class="mainHeader">
            <div class="mainHeaderL">
                <button class="menuToggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <a href="main.html">
                    <div class="mainLogo"></div>
                </a>

                <div class="searchToggleWrap">
                    <button class="searchToggleBtn" id="searchToggleBtn" aria-label="Open search">
                        <svg class="searchIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>

                    <div class="searchPopup" id="searchPopup">
                        <div class="searchPopupInner">
                            <input type="text" id="searchPopupInput" placeholder="Search">
                            <button class="searchPopupClose" id="searchPopupClose" aria-label="Close search">&times;</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mainHeaderR">
                <button class="notificationBtn" id="notificationBtn">
                    <svg class="notificationIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">
                        <path d="M18.9,11.2s0-8.7-6.9-8.7-6.9,8.7-6.9,8.7v3.9L2.5,17.5h19l-2.6-2.4Z"
                            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                        <path d="M14.5,20.5s-.5,1-2.5,1-2.5-1-2.5-1"
                            stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"/>
                    </svg>
                    <span class="notificationBadge" id="notificationBadge" style="display: none;">0</span>
                </button>

                <button class="profileBtn" id="profileBtn">
                    <div class="profilePic"></div>
                </button>
            </div>
        </header>

        <div class="mainBody">
            <aside class="sidebar" id="sidebar">
                <nav class="sidebarNav">
                    <div class="navSection">
                        <h4 class="navSectionTitle">Navigation</h4>
                        <a href="#" class="navLink active" data-page="home">
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path fill-rule="evenodd" d="M11.293 3.293a1 1 0 0 1 1.414 0l6 6 2 2a1 1 0 0 1-1.414 1.414L19 12.414V19a2 2 0 0 1-2 2h-3a1 1 0 0 1-1-1v-3h-2v3a1 1 0 0 1-1 1H7a2 2 0 0 1-2-2v-6.586l-.293.293a1 1 0 0 1-1.414-1.414l2-2 6-6Z" clip-rule="evenodd"/>
                            </svg>
                            <span>Home</span>
                        </a>
                        <!--<a href="#" class="navLink" data-page="scan">
                            <svg class="navIcon icon-scan" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"

                            </svg>
                            <span>Scan With Appl-AI</span>
                        </a>-->
                        <a href="#" class="navLink" data-page="saved">
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                            </svg>
                            <span>Saved</span>
                        </a> 
                        
                    </div>
                    <div class="navSection">
                        <h4 class="navSectionTitle">Resources</h4>
                        <a href="#" class="navLink settings" data-page="settings">
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M10.83 5a3.001 3.001 0 0 0-5.66 0H4a1 1 0 1 0 0 2h1.17a3.001 3.001 0 0 0 5.66 0H20a1 1 0 1 0 0-2h-9.17ZM4 11h9.17a3.001 3.001 0 0 1 5.66 0H20a1 1 0 1 1 0 2h-1.17a3.001 3.001 0 0 1-5.66 0H4a1 1 0 1 1 0-2Zm1.17 6H4a1 1 0 1 0 0 2h1.17a3.001 3.001 0 0 0 5.66 0H20a1 1 0 1 0 0-2h-9.17a3.001 3.001 0 0 0-5.66 0Z"/>
                            </svg>
                            <span>Settings</span>
                        </a>

                        <a href="#" class="navLink help" data-page="help">
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">

                            </svg>
                            <span>Help</span>
                        </a>

                        <a href="#" class="navLink rules" data-page="rules">
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
                                <path fill-rule="evenodd" d="M11 4.717c-2.286-.58-4.16-.756-7.045-.71A1.99 1.99 0 0 0 2 6v11c0 1.133.934 2.022 2.044 2.007 2.759-.038 4.5.16 6.956.791V4.717Zm2 15.081c2.456-.631 4.198-.829 6.956-.791A2.013 2.013 0 0 0 22 16.999V6a1.99 1.99 0 0 0-1.955-1.993c-2.885-.046-4.76.13-7.045.71v15.081Z" clip-rule="evenodd"/>

                            <span>Rules</span>
                        </a>
                    </div>
                </nav>
                <div class="sidebarNavFooter">
                    <button class="logoutBtn formBtn">Logout</button>
                    <p class="navFooterText">©2026 APPL-AI, All Rights Reserved</p>
                </div>
            </aside>

            <main class="mainContent" id="mainContent">
            </main>

            <aside class="featuredSidebar" id="featuredSidebar">
                <div class="featuredContainer">
                    <div class="featuredHeader">
                        <h3>Featured Companies</h3>
                    </div>
                    <div class="featuredList" id="featuredListContainer"></div>
                </div>
            </aside>
        </div>
    </div>

    <div class="modal" id="notificationModal">
        <div class="notificationPanel">
            <div class="notificationHeader">
                <h3>Notifications</h3>
                <button class="closeBtn" data-modal="notificationModal">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="notificationContent" id="notificationContentContainer">
            </div>
        </div>
    </div>

    <div class="modal" id="applyModal">
        <div class="formContainer">
            <button class="backBtn" data-modal="applyModal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back
                </button>
            <div class="formWrapper">
                <h1 class="formTitle">Apply For The Job!</h2>
                <p class="formSubtitle">Please make sure to attach the following:</p>
                <div class="fileUploadSection formInput">
                    <label>Attach a Resume File:</label>
                    <div class="fileDropZone" id="fileDropZone">
                        <p>Drag and Drop files or <button type="button" class="browseBtn" id="browseBtn">Browse</button></p>
                        <input type="file" id="fileInput" hidden accept=".pdf,.docx">
                    </div>
                </div>
                <button class="submitResume formBtn" id="submitApplicationBtn">Submit Application</button>
            </div>
        </div>
    </div>

    <div class="modal" id="imagePreviewModal">
        <div class="imagePreviewOverlay" data-close-image-preview="true">
            <button type="button" class="closeBtn imagePreviewClose" data-modal="imagePreviewModal" aria-label="Close preview">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>

            <div class="imagePreviewContent">
                <img id="imagePreviewImg" src="" alt="Post preview image">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="./config.js"></script>
    <script src="./function/supabase.js"></script>
    <script src="./function/main.js"></script>
</body>
</html>
