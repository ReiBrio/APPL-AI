<div class="pageContent focus-mode viewApplicant">
    <div class="focusInner">
        <div class="viewApplicationLayout">
            <div class="applicationMain">
                <button class="backBtn" id="backToApplicantsBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back
                </button>

                <div class="applicationSidebar">
                    <div class="applicantProfile applicantProfileLink" id="viewApplicationApplicantProfile">
                        <div class="applicantAvatar" id="viewApplicationApplicantAvatar"></div>
                        <h3 id="viewApplicationApplicantName">Applicant Name</h3>
                        <p id="viewApplicationApplicantUsername">@username</p>
                    </div>

                    <div class="applicantScore">
                        <h3>Applicant Score</h3>

                        <div class="donutChartContainer active" id="donutChartContainer">
                            <div class="donutChart" id="donutChart" style="--final-degree: 0deg;">
                                <span class="donutChartCenter" id="mainPercentage">0%</span>
                            </div>
                        </div>

                        <div class="scoreContainer">
                            <div class="chartCard" id="scoreBarsContainer"></div>
                        </div>

                        <div class="formOptions">
                            <button type="button" class="approveBtn formBtn accept-btn-full">Accept</button>
                            <button type="button" class="rejectBtn formBtn reject-btn-full">Reject</button>
                            <button type="button" class="resetBtn formBtn reset-btn-full">Reset</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="resumeDetails">
                <div class="detailSection">
                    <h3>Resume Overview</h3>

                    <div class="resumeContent">
                        <div id="resumeOverviewText">No overview available.</div>

                        <p class="overallAssessment">
                            <strong>Overall:</strong>
                            <span id="overallAssessmentText">No overall assessment available.</span>
                        </p>
                    </div>

                    <div class="resumeFooter">
                        <button type="button" class="downloadResumeButton formBtn" id="downloadResumeButton">
                            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 13V4M7 14H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1h-2m-1-5-4 5-4-5m9 8h.01"/>
                            </svg>
                            Download Resume
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
