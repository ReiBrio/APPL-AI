<div class="pageContent focus-mode editForms">
    <div class="formContainer">
        <button class="backBtn" id="backToProfileBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back
        </button>

        <div class="editProfileAvatar">
            <div class="profileAvatar"></div>
            <button class="changePicBtn formBtn" id="browseBtn">Change Photo</button>
            <input type="file" id="fileInput" hidden accept="image/*">
        </div>

        <form class="form" id="editProfileForm">
            <div class="formSection">
                <h3>Account Details</h3>
                <div class="formInput">
                    <label >Description:</label>
                    <textarea id="description" name="description" rows="4" placeholder="Tell us about yourself..."></textarea>
                </div>
                
                <div class="formInput">
                    <label>Username</label>
                    <input type="text" value="bamadebayo" placeholder="Enter username">
                </div>

                <div class="formInput">
                    <label>Email</label>
                    <input type="email" value="bamadebayo@gmail.com" placeholder="Enter email">
                </div>

                <div class="formInput">
                    <label>Password</label>
                    <input type="password" placeholder="Enter new password">
                </div>
            </div>

            <div class="formSection">
                <h3>Personal Details</h3>
                
                <div class="formInput">
                    <label>Surname</label>
                    <input type="text" value="Adebayo" placeholder="Enter surname">
                </div>

                <div class="formInput">
                    <label>First Name</label>
                    <input type="text" value="Bam" placeholder="Enter first name">
                </div>

                <div class="formInput">
                    <label>Middle Name</label>
                    <input type="text" placeholder="Enter middle name">
                </div>

                <div class="formInput">
                    <label>Address</label>
                    <input type="text" value="Vigan City, Ilocos Sur, Philippines" placeholder="Enter address">
                </div>

                <div class="formInput">
                    <label>Sex</label>
                    <select>
                        <option value="male" selected>Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="formInput">
                    <select id="educationAttained" name="educationAttained" required>
                        <option value="" disabled selected>Select Education Attained</option>
                        <option>No Formal Education</option>
                        <option>Elementary Graduate</option>
                        <option>Junior High School Graduate</option>
                        <option>Senior High School Graduate</option>
                        <option>Vocational / Technical Certificate</option>
                        <option>College Undergrad</option>
                        <option>Associate Degree</option>
                        <option>Bachelor’s Degree</option>
                        <option>Master’s Degree</option>
                        <option>Doctorate / PhD</option>
                    </select>
                </div>

                <div class="formInput">
                    <label>Birth Date</label>
                    <input type="date" value="1983-01-01">
                </div>

                <div class="formInput">
                    <label>Contact Number</label>
                    <input type="tel" value="09876543101" placeholder="Enter contact number">
                </div>
            </div>

            <div class="formOptions">
                <button type="button" class="cancelBtn formBtn" id="cancelEditBtn">Cancel</button>
                <button type="submit" class="submitBtn formBtn">Save Changes</button>
            </div>

            <div class="formFooter">
                <button type="button" class="deleteAccountBtn">Delete Account</button>
            </div>
        </form>
    </div>
</div>
