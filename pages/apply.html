<div class="modal" id="applyModal">
    <div class="modal-content apply-modal-content">
        <div class="modal-header">
            <button class="back-btn" data-modal="applyModal">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Back
            </button>
        </div>
        <div class="modal-body">
            <h2>Apply For The Job!</h2>
            <p>Please make sure to attach the following:</p>
            <div class="file-upload-section">
                <label>Attach a Resume File:</label>
                <div class="file-drop-zone" id="fileDropZone">
                    <p>Drag and Drop files or <button class="browse-btn" id="browseBtn">Browse</button></p>
                    <input type="file" id="fileInput" hidden accept=".pdf,.doc,.docx">
                </div>
            </div>
            <button class="submit-btn" id="submitApplicationBtn">Submit Application</button>
        </div>
    </div>
</div>
