<div class="pageContent">
    <div class="pageHeader">
        <h2 class="pageTitle">Search Results</h2>

        <div class="pageFilter">
            <span class="filterLabel">Filter By:</span>

            <select class="filterSelect" id="searchSortFilter">
                <option value="mostRecent">Most Recent</option>
                <option value="oldest">Oldest</option>
            </select>

            <select class="filterSelect" id="searchDeploymentFilter">
                <option value="all">Deployment Type</option>
                <option value="full-time">Full-time</option>
                <option value="part-time">Part-time</option>
                <option value="contract">Contract</option>
                <option value="internship">Internship</option>
            </select>

            <select class="filterSelect" id="searchWorkSetupFilter">
                <option value="all">Work Status</option>
                <option value="remote">Remote</option>
                <option value="on-site">On-site</option>
                <option value="hybrid">Hybrid</option>
            </select>

            <select class="filterSelect" id="searchSalaryFilter">
                <option value="all">Salary Range</option>
                <option value="below20k">Below 20k</option>
                <option value="20k-50k">20k - 50k</option>
                <option value="50k-100k">50k - 100k</option>
                <option value="above100k">Above 100k</option>
            </select>
        </div>
    </div>

    <div class="jobFeed" id="jobFeedContainer"></div>
</div>
